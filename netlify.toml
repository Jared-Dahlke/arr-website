[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS/JS are not content-fingerprinted, so they must revalidate on every
# load (ETag makes this cheap) — a max-age here serves stale styles for an
# hour after each deploy.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
